# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"

  schedule:
    - cron: '*/30 * * * *'  
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:

# env:
#   PYTHON_VERSION: "3.12"
 

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on:  ${{ matrix.os }}
    strategy:
      matrix:
        python-version: ["3.12", "3.13"]
        os: [ubuntu-latest, macos-latest]

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Validate Repository Checkout
        # Verification: List files to prove the code is present on the runner.
        run: |
          echo "=== Verifying Checked Out Files ==="
          ls -la
          echo "Checking for app and tests directories..."
          ls -d app tests 

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version:  ${{ matrix.python-version  }}

      - name: Validate Python and Dependencies Environment
        # Verification: Check python, pip, and what packages are installed.
        run: |
          echo "=== Verifying Python Environment ==="
          python --version
          pip --version
          echo "=== Installed Packages ==="
          pip list  

      - name: runner time
        run: date 

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v



      - name: Run Trivy Filesystem Scan (SCA)
        # Scans source code, packages, and application libraries
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'

      - name: Run Trivy Dockerfile Config Scan (IaC)
        # Checks the Dockerfile structure for misconfigurations (like running as root)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          format: 'table'
          exit-code: '1'
          severity: 'CRITICAL,HIGH'
