# This is the first real CI workflow in the course.
# It verifies a change by running tests on a fresh runner.
name: 02 CI Workflow

on:
  # Run automatically when app code, tests, or this workflow file changes.
  push:
    paths:
      - "app/**"
      - "tests/**"
      - ".github/workflows/02-ci.yml"

  schedule:
    - cron: '*/30 * * * *'  
  # Allow a safe manual run before students trigger it with a code change.
  workflow_dispatch:

# env:
#   PYTHON_VERSION: "3.12"
 

jobs:
  run-tests:
    # The runner is the temporary machine that executes the steps below.
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        # Download the repository contents onto the runner.
        uses: actions/checkout@v6

      - name: Validate Repository Checkout
        # Verification: List files to prove the code is present on the runner.
        run: |
          echo "=== Verifying Checked Out Files ==="
          ls -la
          echo "Checking for app and tests directories..."
          ls -d app tests 

      - name: Set up Python
        # Prepare Python on the runner. This does not change the student laptop.
        uses: actions/setup-python@v6
        with:
          python-version:  ${{ secrets.PYTHON_VERSION  }}

      - name: Validate Python and Dependencies Environment
        # Verification: Check python, pip, and what packages are installed.
        run: |
          echo "=== Verifying Python Environment ==="
          python --version
          pip --version
          echo "=== Installed Packages ==="
          pip list  

      - name: runner time
        run: date 

      - name: Run tests
        # This is the key verification step in the CI workflow.
        run: python -m unittest discover -s tests -v
