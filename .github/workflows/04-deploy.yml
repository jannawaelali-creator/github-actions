# This workflow completes the story by delivering the saved package.
# It starts after the build workflow finishes successfully.
name: 04 Deploy Workflow

on:
  workflow_run:
    # Listen for the build workflow by name.
    workflows: ["03 Build Artifact Workflow"]
    # Start when the build workflow has completed.
    types: [completed]

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR_PREFIX: tiny-health-app
  IMAGE_METADATA_PREFIX: image-metadata
  ARTIFACT_NAME_PREFIX: tiny-health-app-image
  CONTAINER_NAME_PREFIX: tiny-health-container
  APP_PORT_BASE: 8000

permissions:
  # Read access is enough because this workflow only downloads artifacts and reads repo data.
  actions: read
  contents: read

jobs:
  deploy-package:
    # Continue only when the build workflow succeeded.
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    # Use a fresh runner for the deployment simulation.
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]

    steps:
      - name: Download build artifact
        # Download the unique matrix-based artifact produced by the build run.
        uses: actions/download-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME_PREFIX }}-py${{ matrix.python-version }}
          github-token: ${{ github.token }}
          repository: ${{ github.repository }}
          run-id: ${{ github.event.workflow_run.id }}
          path: downloaded-artifact-${{ matrix.python-version }}

      - name: Show downloaded files
        run: ls -R downloaded-artifact-${{ matrix.python-version }}

      - name: Load Docker image
        # Turn the saved matrix artifact file back into a Docker image.
        run: docker load --input "downloaded-artifact-${{ matrix.python-version }}/${{ env.IMAGE_TAR_PREFIX }}-${{ matrix.python-version }}.tar"

      - name: Read image metadata from build artifact
        id: image-metadata
        run: |
          source "downloaded-artifact-${{ matrix.python-version }}/${{ env.IMAGE_METADATA_PREFIX }}-${{ matrix.python-version }}.env"
          echo "image_tag=${IMAGE_TAG}" >> "$GITHUB_OUTPUT"
          echo "image_reference=${IMAGE_REFERENCE}" >> "$GITHUB_OUTPUT"

      - name: Show exact image reference
        # REQUIREMENT: Show the exact date-plus-run-id image tag the workflow recreates.
        run: |
          echo "Deploying Reference: ${{ steps.image-metadata.outputs.image_reference }}"
          echo "Recreated Image Tag: ${{ steps.image-metadata.outputs.image_tag }}"

      - name: Start container
        run: |
          docker run -d \
            --name "${{ env.CONTAINER_NAME_PREFIX }}-${{ matrix.python-version }}" \
            -p "${{ env.APP_PORT_BASE }}:8000" \
            "${{ steps.image-metadata.outputs.image_reference }}"

      - name: Inspect running containers
        # REQUIREMENT: After startup, show the running containers with docker ps
        run: docker ps

      - name: Smoke test and inspect deployed app
        # REQUIREMENT: Print the /health response body
        run: |
          for attempt in 1 2 3 4 5; do
            if curl --fail --silent "http://127.0.0.1:${{ env.APP_PORT_BASE }}/health"; then
              echo "--- /health Response Body ---"
              curl --silent "http://127.0.0.1:${{ env.APP_PORT_BASE }}/health"
              echo -e "\n-----------------------------"
              exit 0
            fi
            echo "Waiting for app to become ready..."
            sleep 2
          done
          echo "App did not become ready in time."
          exit 1

      - name: Stop container
        if: always()
        run: docker rm -f "${{ env.CONTAINER_NAME_PREFIX }}-${{ matrix.python-version }}" || true
