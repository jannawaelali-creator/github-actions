name: 01 Hello Workflow

on:
  pull_request:
    types: [closed]
    branches:
      - main
  workflow_dispatch:

jobs:
  say-hello:
    # Only run if the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true

    runs-on: ubuntu-latest

    steps:
      - name: Say hello
        run: echo "Hello from GitHub Actions"