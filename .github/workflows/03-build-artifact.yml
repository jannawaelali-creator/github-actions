name: 03 Build Artifact Workflow

on:
  workflow_dispatch:

permissions:
  security-events: write

env:
  IMAGE_NAME: tiny-health-app
  IMAGE_TAR_PREFIX: tiny-health-app
  IMAGE_METADATA_PREFIX: image-metadata
  ARTIFACT_NAME_PREFIX: tiny-health-app-image

jobs:
  # PHASE 1: Verification (CI)
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests -v

  # PHASE 2: Packaging (Runs only after verify succeeds, fans out via matrix)
  build-package:
    needs: verify
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      # Set up Docker Buildx (Carrying over the EX-05 enhancement)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Set image tag
        id: image-tag
        run: |
          TODAY="$(date -u +%Y-%m-%d)"
          IMAGE_TAG="${TODAY}-${GITHUB_RUN_ID}-py${{ matrix.python-version }}"
          echo "image_tag=$IMAGE_TAG" >> "$GITHUB_OUTPUT"

      - name: Build Docker image with Buildx
        uses: docker/build-push-action@v5
        with:
          context: .
          load: true # Loads the image into the local Docker daemon for subsequent testing/saving
          tags: ${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}
          build-args: |
            PYTHON_VERSION=${{ matrix.python-version }}

      - name: Run Trivy vulnerability scan on Docker image
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ steps.image-tag.outputs.image_tag }}
          format: 'table'
          continue-on-error: true

      - name: Run Trivy vulnerability scan on filesystem
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: '.'
          format: 'table'
          continue-on-error: true

      - name: Save Docker image as artifact file
        run: |
          docker save "${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}" -o "${{ env.IMAGE_TAR_PREFIX }}-${{ matrix.python-version }}.tar"

      - name: Run Trivy vulnerability scan on artifact
        uses: aquasecurity/trivy-action@master
        with:
          input: ${{ env.IMAGE_TAR_PREFIX }}-${{ matrix.python-version }}.tar
          format: 'sarif'
          output: 'trivy-artifact-results-${{ matrix.python-version }}.sarif'
          continue-on-error: true

      - name: Upload artifact SARIF
        if: hashFiles(format('trivy-artifact-results-{0}.sarif', matrix.python-version)) != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: trivy-artifact-results-${{ matrix.python-version }}.sarif
          category: trivy-artifact-${{ matrix.python-version }}

      - name: Save image metadata
        run: |
          IMAGE_REFERENCE="${IMAGE_NAME}:${{ steps.image-tag.outputs.image_tag }}"
          FILENAME="${{ env.IMAGE_METADATA_PREFIX }}-${{ matrix.python-version }}.env"
          printf 'IMAGE_TAG=%s\n' "${{ steps.image-tag.outputs.image_tag }}" > "$FILENAME"
          printf 'IMAGE_REFERENCE=%s\n' "${IMAGE_REFERENCE}" >> "$FILENAME"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.ARTIFACT_NAME_PREFIX }}-py${{ matrix.python-version }}
          path: |
            ${{ env.IMAGE_TAR_PREFIX }}-${{ matrix.python-version }}.tar
            ${{ env.IMAGE_METADATA_PREFIX }}-${{ matrix.python-version }}.env
          retention-days: 7
